<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app{padding:12px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;flex-shrink:0}
.toolbar input[type=text]{flex:1;min-width:160px;max-width:260px;font-size:13px;padding:5px 10px;border:1px solid #d0d0cc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.toolbar input[type=text]:focus{border-color:#4A90D9}

.person-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:2px solid transparent;user-select:none}
.person-chip.selected{border-color:rgba(0,0,0,0.45)}
.legend-label{font-size:12px;color:#777;margin-right:4px}
.scroll-wrap{overflow:auto;border:1px solid #e0e0db;border-radius:12px;background:#fff;flex:1;min-height:0}
table{border-collapse:collapse;font-size:11.5px;table-layout:fixed}
thead th{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e0e0db}
th,td{border-right:1px solid #e8e8e4;border-bottom:1px solid #e8e8e4;padding:0}

/* sticky left columns */
th.col-drag{width:22px;min-width:22px;position:sticky;left:0;z-index:11;background:#fff}
th.col-addr{width:160px;min-width:160px;text-align:left;padding:6px 8px 6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:22px;z-index:11;background:#fff;overflow:visible}
.col-resize-handle{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:20;display:flex;align-items:center;justify-content:center;user-select:none}
.col-resize-handle::after{content:'';display:block;width:2px;height:60%;background:#d0d0cc;border-radius:2px}
.col-resize-handle:hover::after,.col-resize-handle.resizing::after{background:#4A90D9}
th.col-client{width:120px;min-width:120px;text-align:left;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:182px;z-index:11;background:#fff;overflow:visible}
th.col-work{width:200px;min-width:200px;text-align:left;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:302px;z-index:11;background:#fff;overflow:visible}

td.col-drag{width:22px;min-width:22px;position:sticky;left:0;z-index:8;background:#fff;text-align:center;vertical-align:middle;cursor:grab;color:#ccc;user-select:none;font-size:14px;line-height:1}
td.col-drag:active{cursor:grabbing}
td.col-addr{width:160px;min-width:160px;max-width:160px;padding:6px 8px;font-size:12px;vertical-align:middle;color:#1a1a1a;position:sticky;left:22px;z-index:8;background:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
td.col-client{width:120px;min-width:120px;max-width:120px;padding:5px 8px;font-size:11px;vertical-align:middle;position:sticky;left:182px;z-index:8;background:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
td.col-client:hover{background:#f0f6ff !important}
td.col-work{width:200px;min-width:200px;max-width:200px;padding:5px 8px;font-size:11px;color:#666;vertical-align:middle;position:sticky;left:302px;z-index:8;background:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

tbody tr:hover td.col-drag,tbody tr:hover td.col-addr,tbody tr:hover td.col-work{background:#f8f8f5}

th.col-mat{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:502px;z-index:11;background:#fff}
th.col-planned{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:582px;z-index:11;background:#fff}
th.col-done{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:662px;z-index:11;background:#fff}
th.col-inv{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:742px;z-index:11;background:#fff}
td.col-mat{width:80px;min-width:80px;position:sticky;left:502px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
td.col-planned{width:80px;min-width:80px;position:sticky;left:582px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
td.col-done{width:80px;min-width:80px;position:sticky;left:662px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
td.col-inv{width:80px;min-width:80px;position:sticky;left:742px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
tbody tr:hover td.col-mat,tbody tr:hover td.col-planned,tbody tr:hover td.col-done,tbody tr:hover td.col-inv{background:#f8f8f5}
tr.highlight td.col-mat,tr.highlight td.col-planned,tr.highlight td.col-done,tr.highlight td.col-inv{background:#fff8e1 !important}
.mat-cb{width:16px;height:16px;cursor:pointer;accent-color:#27AE60}
th.month-hd{text-align:center;font-size:10px;font-weight:600;color:#999;padding:3px 4px;letter-spacing:.3px;text-transform:uppercase;border-top:1px solid #e8e8e4}

th.day-hd{text-align:center;font-size:9px;width:48px;min-width:48px;max-width:48px;padding:3px 2px;color:#888;line-height:1.3}
th.day-hd.we{background:#f2f2ee}
td.day-cell{width:48px;min-width:48px;max-width:48px;height:42px;cursor:pointer;vertical-align:top;padding:0;overflow:hidden;position:relative}
td.day-cell:hover{outline:2px solid #555;outline-offset:-1px;z-index:5}
td.day-cell.we{background:#f5f5f1}
.cell-inner{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
.cell-seg{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cell-seg span{font-size:8px;font-weight:700;color:#fff;line-height:1;padding:0 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

tr.highlight td.col-addr,tr.highlight td.col-work,tr.highlight td.col-drag,tr.highlight td.col-client{background:#fff8e1 !important}
tr.drag-over td{box-shadow:inset 0 -2px 0 #4A90D9}
tr.dragging{opacity:.35}

/* client name display in cell */
.client-name{font-weight:500;color:#1a56db;font-size:11px}
.client-has-contact::after{content:'ℹ';font-size:9px;color:#9ca3af;margin-left:3px;vertical-align:middle}

/* contact popup */
.contact-popup{position:fixed;z-index:600;background:#fff;border:1px solid #d0d0cc;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.13);padding:16px 18px;min-width:220px;max-width:280px}
.contact-popup h4{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a1a1a;display:flex;align-items:center;justify-content:space-between}
.contact-popup h4 button{background:none;border:none;cursor:pointer;font-size:16px;color:#999;line-height:1;padding:0 2px}

.contact-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;color:#333}

.contact-row a{color:#1a56db;text-decoration:none}
.contact-row a:hover{text-decoration:underline}
.contact-note{font-size:11px;color:#666;margin-top:8px;padding-top:8px;border-top:1px solid #eee;line-height:1.5}

/* modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:22px 24px;width:400px;max-width:95vw;border:1px solid #ccc;box-shadow:0 8px 24px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px;color:#1a1a1a}
.modal label{display:block;font-size:11px;color:#777;margin:8px 0 3px}
.modal input[type=text],.modal textarea{width:100%;font-size:12px;padding:6px 9px;border:1px solid #ccc;border-radius:8px;outline:none;color:#1a1a1a;background:#fff}
.modal input[type=text]:focus,.modal textarea:focus{border-color:#4A90D9}
.modal textarea{resize:vertical;min-height:56px}
.modal-section{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px;padding-top:14px;border-top:1px solid #eee}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.mbtn{font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a1a}
.mbtn:hover{background:#f5f5f3}
.mbtn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.mbtn.primary:hover{background:#333}
.mbtn.danger{color:#dc2626;border-color:#fca5a5}
.mbtn.danger:hover{background:#fff5f5}
.sb-note{font-size:11px;color:#777;line-height:1.6;margin-top:10px;background:#f8f8f5;padding:10px;border-radius:8px}
.sb-note code{font-family:monospace;font-size:10px;background:#eee;padding:1px 4px;border-radius:3px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ccc;margin-right:4px;vertical-align:middle}
.sync-dot.ok{background:#22c55e}.sync-dot.err{background:#ef4444}
.sync-dot.busy{background:#f59e0b;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pmrow{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.pmrow input[type=color]{width:30px;height:28px;padding:1px;border-radius:5px;border:1px solid #ccc;cursor:pointer;flex-shrink:0}
.pmrow input[type=text]{flex:1;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;outline:none;color:#1a1a1a}
td.day-cell.drag-preview{outline:2px solid #4A90D9 !important;outline-offset:-2px;z-index:7;background:#dbeafe !important}
td.day-cell.drag-preview.we{background:#bfdbfe !important}
.cell-tooltip{position:fixed;background:#222;color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;pointer-events:none;z-index:999;white-space:pre;line-height:1.5;display:none}
</style>

<body>
<div id="setup-banner" style="display:none;background:#1e3a5f;color:#fff;padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:10px;flex-shrink:0">
  <span style="font-size:16px">☁</span>
  <span><strong>Supabase niet gekoppeld</strong> — data wordt alleen lokaal opgeslagen. Klik op ☁ Supabase rechts bovenin om de koppeling in te stellen voor teamgebruik.</span>
  <button onclick="document.getElementById('setup-banner').style.display='none'" style="margin-left:auto;background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px">Sluiten</button>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="&#128269; Zoek op adres of klant..." oninput="doSearch()">
    <span id="search-info" style="font-size:12px;color:#888"></span>
    <button id="clear-btn" onclick="clearSearch()" style="display:none">✕ Wis</button>

<script>
const MONTH_NL=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const DAY_SHORT=['zo','ma','di','wo','do','vr','za'];
const WEEK_COUNT=52;
const today=new Date();
const todayKey=dateKey(today);

function getMonday(d){const c=new Date(d);const day=c.getDay();c.setDate(c.getDate()-(day===0?6:day-1));c.setHours(0,0,0,0);return c}
function addDays(d,n){const c=new Date(d);c.setDate(c.getDate()+n);return c}
function dateKey(d){return d.toISOString().slice(0,10)}
function cellKey(rowId,date){return rowId+'_'+dateKey(date)}
function isoWeek(d){const c=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=c.getUTCDay()||7;c.setUTCDate(c.getUTCDate()+4-day);const y=new Date(Date.UTC(c.getUTCFullYear(),0,1));return Math.ceil((((c-y)/86400000)+1)/7)}
function dayLabel(d){return DAY_SHORT[d.getDay()]+' '+d.getDate()}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

const startMonday=getMonday(addDays(today,-7*4));
let allDays=[];
for(let w=0;w<WEEK_COUNT;w++)for(let d=0;d<7;d++)allDays.push(addDays(startMonday,w*7+d));

function LS(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function LSset(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

const DEF_PERSONS=[
  {id:'r',name:'Roy',color:'#4A90D9'},
  {id:'t',name:'Thom',color:'#27AE60'},
  {id:'m',name:'Monteur 1',color:'#E67E22'},
  {id:'k',name:'Monteur 2',color:'#9B59B6'},
  {id:'x',name:'Extern',color:'#E74C3C'}
];
let persons=LS('plan_persons',DEF_PERSONS);
let rows=LS('plan_rows',[
  {id:1,addr:'Lijnbaan 21F, Heemskerk',client:'',phone:'',email:'',note:'',work:'Sigenergy installatie 10kWh',mat_ordered:false,planned_client:false,job_done:false,invoiced:false,sort:0},
  {id:2,addr:'Zeestraat 14, IJmuiden',client:'',phone:'',email:'',note:'',work:'Enphase batterij + omvormer',mat_ordered:false,planned_client:false,job_done:false,invoiced:false,sort:1},
  {id:3,addr:'Hoofdstraat 88, Beverwijk',client:'',phone:'',email:'',note:'',work:'Zonnepanelen 12x + EV lader',mat_ordered:false,planned_client:false,job_done:false,invoiced:false,sort:2},
]);
rows.forEach((r,i)=>{
  if(r.sort==null)r.sort=i;
  if(r.client===undefined)r.client='';
  if(r.phone===undefined)r.phone='';
  if(r.email===undefined)r.email='';
  if(r.note===undefined)r.note='';
  if(r.mat_ordered===undefined)r.mat_ordered=false;
  if(r.planned_client===undefined)r.planned_client=false;
  if(r.job_done===undefined)r.job_done=false;
  if(r.invoiced===undefined)r.invoiced=false;
});
rows.sort((a,b)=>a.sort-b.sort);
let cells=LS('plan_cells',{});
let selected=[];
let nextId=Math.max(...rows.map(r=>r.id),0)+1;
let searchTerm='';
let SB_URL=localStorage.getItem('sb_url')||'';
let SB_KEY=localStorage.getItem('sb_key')||'';
let sbClient=null;

function saveAll(){LSset('plan_persons',persons);LSset('plan_rows',rows);LSset('plan_cells',cells)}
function setSyncStatus(s){
  document.getElementById('sync-dot').className='sync-dot '+(s==='ok'?'ok':s==='err'?'err':s==='busy'?'busy':'');
  document.getElementById('sync-txt').textContent=s==='ok'?'Verbonden':s==='err'?'Fout':s==='busy'?'Bezig…':'Lokaal';
}
function initSB(){
  if(!SB_URL||!SB_KEY||!window.supabase){setSyncStatus('');return}
  try{sbClient=window.supabase.createClient(SB_URL,SB_KEY);setSyncStatus('busy');syncFromSB();setTimeout(initRealtime,1500)}
  catch(e){sbClient=null;setSyncStatus('err')}
}
async function syncFromSB(){
  if(!sbClient)return;setSyncStatus('busy');
  try{
    const[rr,cr,pr]=await Promise.all([
      sbClient.from('plan_rows').select('*').order('sort'),
      sbClient.from('plan_cells').select('*'),
      sbClient.from('plan_persons').select('*').order('sort'),
    ]);
    if(!rr.error&&rr.data){rows=rr.data.length?rr.data:[];rows.sort((a,b)=>a.sort-b.sort);LSset('plan_rows',rows)}
    if(!cr.error&&cr.data){cells={};cr.data.forEach(c=>{cells[c.key]=c.persons});LSset('plan_cells',cells)}
    if(!pr.error&&pr.data&&pr.data.length){persons=pr.data;LSset('plan_persons',persons)}
    setSyncStatus('ok');rebuildAll();
  }catch(e){setSyncStatus('err')}
}
async function pushRows(){if(!sbClient)return;try{await sbClient.from('plan_rows').upsert(rows,{onConflict:'id'})}catch(e){}}
async function pushCell(key){
  if(!sbClient)return;const ps=cells[key];
  if(!ps?.length){try{await sbClient.from('plan_cells').delete().eq('key',key)}catch(e){}}
  else{try{await sbClient.from('plan_cells').upsert({key,persons:ps},{onConflict:'key'})}catch(e){}}
}
async function pushPersons(){if(!sbClient)return;try{await sbClient.from('plan_persons').upsert(persons,{onConflict:'id'})}catch(e){}}

/* ── PERSONS BAR ─────────────────────────────────────────── */
function buildPersonsBar(){
  const bar=document.getElementById('persons-bar');
  bar.innerHTML='<span class="legend-label">Selecteer persoon om in te plannen:</span>';
  persons.forEach(p=>{
    const c=document.createElement('div');c.className='person-chip'+(selected.includes(p.id)?' selected':'');
    c.style.background=p.color+'33';c.style.color=p.color;
    c.innerHTML=`<span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>${esc(p.name)}`;
    c.onclick=()=>togglePerson(p.id);bar.appendChild(c);
  });
}
function togglePerson(id){
  if(selected.includes(id)){selected=selected.filter(x=>x!==id)}
  else selected=[...selected,id];
  buildPersonsBar();
}

/* ── HEADER ──────────────────────────────────────────────── */
function buildHeader(){
  const thead=document.getElementById('thead');thead.innerHTML='';
  const r1=document.createElement('tr');
  const mkTh=(cls,txt,rs)=>{const t=document.createElement('th');t.className=cls;if(rs)t.rowSpan=rs;if(txt)t.textContent=txt;return t};
  r1.appendChild(mkTh('col-drag','',3));
  const thAddr=mkTh('col-addr','',3);
  thAddr.innerHTML='<span>Adres</span><div class="col-resize-handle" id="addr-resize-handle"></div>';
  r1.appendChild(thAddr);
  const thClient=mkTh('col-client','',3);
  thClient.innerHTML='<span>Klant</span><div class="col-resize-handle" id="client-resize-handle"></div>';
  r1.appendChild(thClient);
  const thWork=mkTh('col-work','',3);
  thWork.innerHTML='<span>Werkzaamheden</span><div class="col-resize-handle" id="work-resize-handle"></div>';
  r1.appendChild(thWork);
  const thMat=mkTh('col-mat','',3);thMat.innerHTML='<span style="font-size:10px;font-weight:600;color:#888;line-height:1.25;display:block;padding:4px 6px;white-space:normal;text-align:center">Materialen<br>besteld</span>';
  r1.appendChild(thMat);
  const thPlanned=mkTh('col-planned','',3);
  thPlanned.innerHTML='<span style="font-size:10px;font-weight:600;color:#888;line-height:1.25;display:block;padding:4px 6px;white-space:normal;text-align:center">Gepland met<br>opdrachtgever</span>';
  r1.appendChild(thPlanned);
  const thDone=mkTh('col-done','',3);
  thDone.innerHTML='<span style="font-size:10px;font-weight:600;color:#888;line-height:1.25;display:block;padding:4px 6px;white-space:normal;text-align:center">Klus<br>afgerond</span>';
  r1.appendChild(thDone);
  const thInv=mkTh('col-inv','',3);
  thInv.innerHTML='<span style="font-size:10px;font-weight:600;color:#888;line-height:1.25;display:block;padding:4px 6px;white-space:normal;text-align:center">Ge&shy;factureerd</span>';
  r1.appendChild(thInv);
  let wi=0;
  while(wi<WEEK_COUNT){
    const m=addDays(startMonday,wi*7).getMonth(),yr=addDays(startMonday,wi*7).getFullYear();
    let span=1;while(wi+span<WEEK_COUNT&&addDays(startMonday,(wi+span)*7).getMonth()===m)span++;
    const th=document.createElement('th');th.colSpan=span*7;th.className='month-hd';
    th.textContent=MONTH_NL[m]+' '+yr;r1.appendChild(th);wi+=span;
  }
  thead.appendChild(r1);
  const r2=document.createElement('tr');
  for(let w=0;w<WEEK_COUNT;w++){
    const th=document.createElement('th');th.colSpan=7;th.className='week-hd';
    th.textContent='w'+isoWeek(addDays(startMonday,w*7));r2.appendChild(th);
  }
  thead.appendChild(r2);
  const r3=document.createElement('tr');
  allDays.forEach(d=>{
    const isWE=d.getDay()===0||d.getDay()===6;
    const th=document.createElement('th');th.className='day-hd'+(isWE?' we':'');
    th.innerHTML=dayLabel(d).replace(' ','<br>');r3.appendChild(th);
  });

/* ── CELL RENDER ─────────────────────────────────────────── */
function renderCell(rowId,date){
  const ps=cells[cellKey(rowId,date)]||[];if(!ps.length)return'';
  const found=ps.map(pid=>persons.find(p=>p.id===pid)).filter(Boolean);
  if(!found.length)return'';
  const segs=found.map(p=>`<div class="cell-seg" style="background:${p.color}"><span>${esc(p.name)}</span></div>`).join('');
  return`<div class="cell-inner">${segs}</div>`;
}

/* ── BODY ────────────────────────────────────────────────── */
function buildBody(filter){
  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  const list=filter?rows.filter(r=>r.addr.toLowerCase().includes(filter.toLowerCase())||r.client.toLowerCase().includes(filter.toLowerCase())):[...rows];
  list.forEach(row=>{
    const tr=document.createElement('tr');tr.dataset.id=row.id;
    if(filter)tr.className='highlight';

    /* drag handle */
    const dragTd=document.createElement('td');dragTd.className='col-drag';
    dragTd.innerHTML='&#8942;&#8942;';dragTd.title='Versleep om volgorde te wijzigen';
    dragTd.onmousedown=()=>{tr.draggable=true};dragTd.onmouseup=()=>{tr.draggable=false};
    tr.appendChild(dragTd);

    /* address */
    const addrTd=document.createElement('td');addrTd.className='col-addr';
    addrTd.textContent=row.addr;addrTd.title=row.addr;addrTd.ondblclick=()=>editRow(row.id);
    tr.appendChild(addrTd);

    /* client */
    const clientTd=document.createElement('td');clientTd.className='col-client';
    const hasContact=row.phone||row.email||row.note;
    if(row.client){
      clientTd.innerHTML=`<span class="client-name${hasContact?' client-has-contact':''}">${esc(row.client)}</span>`;
      clientTd.title=hasContact?'Klik voor contactgegevens':'Dubbelklik om te bewerken';
    }else{
      clientTd.innerHTML=`<span style="color:#bbb;font-size:11px">—</span>`;
      clientTd.title='Dubbelklik om klant toe te voegen';
    }
    clientTd.onclick=e=>{if(row.client&&hasContact)showContactPopup(row.id,e)};
    clientTd.ondblclick=()=>editRow(row.id);
    tr.appendChild(clientTd);

    /* work */
    const workTd=document.createElement('td');workTd.className='col-work';
    workTd.textContent=row.work;workTd.title=row.work;workTd.ondblclick=()=>editRow(row.id);
    tr.appendChild(workTd);

    /* materials ordered */
    const matTd=document.createElement('td');matTd.className='col-mat';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='mat-cb';
    cb.checked=!!row.mat_ordered;cb.title=cb.checked?'Materialen besteld':'Nog niet besteld';
    cb.onchange=()=>{row.mat_ordered=cb.checked;cb.title=cb.checked?'Materialen besteld':'Nog niet besteld';matTd.style.background=cb.checked?'#f0fdf4':'';saveAll();pushRows()};
    matTd.appendChild(cb);
    if(row.mat_ordered)matTd.style.background='#f0fdf4';
    tr.appendChild(matTd);

    /* planned with client */
    const plannedTd=document.createElement('td');plannedTd.className='col-planned';
    const cbPlanned=document.createElement('input');cbPlanned.type='checkbox';cbPlanned.className='mat-cb';
    cbPlanned.style.accentColor='#d97706';
    cbPlanned.checked=!!row.planned_client;cbPlanned.title=cbPlanned.checked?'Gepland met opdrachtgever':'Nog niet gepland met opdrachtgever';
    cbPlanned.onchange=()=>{row.planned_client=cbPlanned.checked;cbPlanned.title=cbPlanned.checked?'Gepland met opdrachtgever':'Nog niet gepland';plannedTd.style.background=cbPlanned.checked?'#fffbeb':'';saveAll();pushRows()};
    plannedTd.appendChild(cbPlanned);
    if(row.planned_client)plannedTd.style.background='#fffbeb';
    tr.appendChild(plannedTd);

    /* job done */
    const doneTd=document.createElement('td');doneTd.className='col-done';
    const cbDone=document.createElement('input');cbDone.type='checkbox';cbDone.className='mat-cb';
    cbDone.style.accentColor='#2563eb';
    cbDone.checked=!!row.job_done;cbDone.title=cbDone.checked?'Klus afgerond':'Nog niet afgerond';
    cbDone.onchange=()=>{row.job_done=cbDone.checked;cbDone.title=cbDone.checked?'Klus afgerond':'Nog niet afgerond';doneTd.style.background=cbDone.checked?'#eff6ff':'';saveAll();pushRows()};
    doneTd.appendChild(cbDone);
    if(row.job_done)doneTd.style.background='#eff6ff';
    tr.appendChild(doneTd);

    /* invoiced */
    const invTd=document.createElement('td');invTd.className='col-inv';
    const cbInv=document.createElement('input');cbInv.type='checkbox';cbInv.className='mat-cb';
    cbInv.style.accentColor='#9333ea';
    cbInv.checked=!!row.invoiced;cbInv.title=cbInv.checked?'Gefactureerd':'Nog niet gefactureerd';
    cbInv.onchange=()=>{row.invoiced=cbInv.checked;cbInv.title=cbInv.checked?'Gefactureerd':'Nog niet gefactureerd';invTd.style.background=cbInv.checked?'#faf5ff':'';saveAll();pushRows()};
    invTd.appendChild(cbInv);
    if(row.invoiced)invTd.style.background='#faf5ff';
    tr.appendChild(invTd);

    /* day cells */
    allDays.forEach(d=>{
      const isWE=d.getDay()===0||d.getDay()===6;
      const td=document.createElement('td');td.className='day-cell'+(isWE?' we':'');
      td.innerHTML=renderCell(row.id,d);
      td.onmousedown=e=>{if(e.button===0){startDragFill(row.id,d,td,e)}};
      td.onmouseenter=e=>{if(dragFill.active&&dragFill.rowId===row.id){applyDragFill(row.id,d)}else showTooltip(row.id,d,e)};
      td.onmouseup=e=>{if(dragFill.active&&dragFill.rowId===row.id){endDragFill(row.id,d)}};
      td.onmouseleave=e=>{if(!dragFill.active)hideTooltip()};
      td.onclick=e=>toggleCell(row.id,d,td,e);
      td.oncontextmenu=e=>{e.preventDefault();clearCellPrompt(row.id,d)};
      tr.appendChild(td);
    });

    /* drag events */
    tr.addEventListener('dragstart',function(e){dragSrcId=parseInt(this.dataset.id);this.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    tr.addEventListener('dragover',function(e){e.preventDefault();document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));this.classList.add('drag-over')});
    tr.addEventListener('dragleave',function(){this.classList.remove('drag-over')});
    tr.addEventListener('dragend',function(){document.querySelectorAll('tr.drag-over,tr.dragging').forEach(r=>r.classList.remove('drag-over','dragging'));this.draggable=false});
    tr.addEventListener('drop',function(e){
      e.preventDefault();const tgtId=parseInt(this.dataset.id);if(dragSrcId===tgtId)return;
      const si=rows.findIndex(r=>r.id===dragSrcId),ti=rows.findIndex(r=>r.id===tgtId);
      if(si<0||ti<0)return;const[moved]=rows.splice(si,1);rows.splice(ti,0,moved);
      rows.forEach((r,i)=>r.sort=i);saveAll();pushRows();buildBody(searchTerm);
    });
    tbody.appendChild(tr);
  });
}
let dragSrcId=null;

    <a href="tel:${esc(row.phone)}">${esc(row.phone)}</a></div>`;
  if(row.email) html+=`<div class="contact-row">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    <a href="mailto:${esc(row.email)}">${esc(row.email)}</a></div>`;

  const rect=e.target.getBoundingClientRect();

/* ── CELL TOGGLE ─────────────────────────────────────────── */
/* ── UNDO STACK ──────────────────────────────────────────── */
let undoStack=[];
const UNDO_MAX=50;
function pushUndo(){
  undoStack.push(JSON.stringify(cells));
  if(undoStack.length>UNDO_MAX)undoStack.shift();
}
function doUndo(){
  if(!undoStack.length)return;
  cells=JSON.parse(undoStack.pop());
  saveAll();buildBody(searchTerm);
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}
});

/* drag-to-fill state */
let dragFill={active:false,rowId:null,startDate:null,removing:false};

function toggleCell(rowId,date,td,e){
  if(!selected.length){
    showNoPerson();return;
  }
  const key=cellKey(rowId,date);const cur=cells[key]||[];
  if(e.shiftKey){
    cells[key]=cur.filter(p=>!selected.includes(p));
  } else {
    const toAdd=selected.filter(p=>!cur.includes(p)),toRm=selected.filter(p=>cur.includes(p));
    if(toAdd.length)cells[key]=[...cur,...toAdd];
    else if(toRm.length)cells[key]=cur.filter(p=>!toRm.includes(p));
  }
  pushUndo();
  if(!cells[key]?.length)delete cells[key];
  td.innerHTML=renderCell(rowId,date);saveAll();pushCell(key);
}

function showNoPerson(){
  const bar=document.getElementById('persons-bar');
  bar.style.outline='2px solid #ef4444';bar.style.borderRadius='8px';
  setTimeout(()=>{bar.style.outline='';bar.style.borderRadius='';},900);
}

function startDragFill(rowId,date,td,e){
  if(!selected.length){showNoPerson();return;}
  const key=cellKey(rowId,date);const cur=cells[key]||[];
  const wouldAdd=selected.some(p=>!cur.includes(p));
  dragFill={active:true,rowId,startDate:date,removing:false};
  applyDragFill(rowId,date);
  e.preventDefault();
}

function applyDragFill(rowId,endDate){
  if(!dragFill.active||dragFill.rowId!==rowId)return;
  const startIdx=allDays.findIndex(d=>dateKey(d)===dateKey(dragFill.startDate));
  const endIdx=allDays.findIndex(d=>dateKey(d)===dateKey(endDate));
  if(startIdx<0||endIdx<0)return;
  const lo=Math.min(startIdx,endIdx),hi=Math.max(startIdx,endIdx);
  document.querySelectorAll('tr[data-id="'+rowId+'"] td.day-cell').forEach((td,i)=>{
    td.classList.remove('drag-preview');
    if(i>=lo&&i<=hi)td.classList.add('drag-preview');
  });
}

function endDragFill(rowId,endDate){
  if(!dragFill.active)return;
  const startIdx=allDays.findIndex(d=>dateKey(d)===dateKey(dragFill.startDate));
  const endIdx=allDays.findIndex(d=>dateKey(d)===dateKey(endDate));
  if(startIdx>=0&&endIdx>=0){
    pushUndo();
    const lo=Math.min(startIdx,endIdx),hi=Math.max(startIdx,endIdx);
    for(let i=lo;i<=hi;i++){
      const d=allDays[i];const key=cellKey(rowId,d);const cur=cells[key]||[];
      const toAdd=selected.filter(p=>!cur.includes(p));
      if(toAdd.length)cells[key]=[...cur,...toAdd];
      if(!cells[key]?.length)delete cells[key];
      pushCell(key);
    }
    saveAll();
  }
  document.querySelectorAll('td.drag-preview').forEach(td=>td.classList.remove('drag-preview'));
  dragFill={active:false,rowId:null,startDate:null,removing:false};
  buildBody(searchTerm);
}
function clearCellPrompt(rowId,date){
  if(!(cells[cellKey(rowId,date)]?.length))return;
  showModal(`<h3>Dag wissen</h3>
    <p style="font-size:12px;color:#777;margin-bottom:8px">${date.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})}</p>
    <div class="modal-btns"><button class="mbtn" onclick="closeModal()">Annuleer</button>
    <button class="mbtn danger" onclick="doClearCell(${rowId},'${dateKey(date)}')">Wis dag</button></div>`);
}
function doClearCell(rowId,dk){pushUndo();const key=rowId+'_'+dk;delete cells[key];saveAll();pushCell(key);closeModal();buildBody(searchTerm)}

  buildBody('');
}

/* ── MISC ─────────────────────────────────────────────────── */
function jumpToday(){
  const weekMonday=getMonday(today);
  const idx=allDays.findIndex(d=>dateKey(d)===dateKey(weekMonday));
  if(idx<0)return;
  const wrap=document.getElementById('scroll-wrap');
  const fixedW=22+colWidths.addr+colWidths.client+colWidths.work+80+80+80+80;
  wrap.scrollLeft=fixedW+idx*48;
}
function showModal(html){
  closeModal();closeContactPopup();
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)closeModal()};
  const box=document.createElement('div');box.className='modal';box.innerHTML=html;
  overlay.appendChild(box);document.getElementById('modal-root').appendChild(overlay);
}
function closeModal(){document.getElementById('modal-overlay')?.remove()}
function rebuildAll(){buildPersonsBar();buildHeader();buildBody(searchTerm);applyColWidths();initResizeHandle();}

/* ── COLUMN RESIZE ─────────────────────────────────────── */
let colWidths={addr:parseInt(localStorage.getItem('cw_addr')||'160'),client:parseInt(localStorage.getItem('cw_client')||'120'),work:parseInt(localStorage.getItem('cw_work')||'200')};

function applyColWidths(){
  const aw=colWidths.addr,cw=colWidths.client,ww=colWidths.work;
  const clientLeft=22+aw;
  const workLeft=clientLeft+cw;
  const matLeft=workLeft+ww;
  const plannedLeft=matLeft+80;
  const doneLeft=plannedLeft+80;
  const invLeft=doneLeft+80;
  document.querySelectorAll('th.col-addr,td.col-addr').forEach(el=>{el.style.width=aw+'px';el.style.minWidth=aw+'px';el.style.maxWidth=aw+'px'});
  document.querySelectorAll('th.col-client,td.col-client').forEach(el=>{el.style.width=cw+'px';el.style.minWidth=cw+'px';el.style.maxWidth=cw+'px';el.style.left=clientLeft+'px'});
  document.querySelectorAll('th.col-work,td.col-work').forEach(el=>{el.style.width=ww+'px';el.style.minWidth=ww+'px';el.style.maxWidth=ww+'px';el.style.left=workLeft+'px'});
  document.querySelectorAll('th.col-mat,td.col-mat').forEach(el=>{el.style.left=matLeft+'px'});
  document.querySelectorAll('th.col-planned,td.col-planned').forEach(el=>{el.style.left=plannedLeft+'px'});
  document.querySelectorAll('th.col-done,td.col-done').forEach(el=>{el.style.left=doneLeft+'px'});
  document.querySelectorAll('th.col-inv,td.col-inv').forEach(el=>{el.style.left=invLeft+'px'});
}

function makeResizable(handleId,colKey,minW,maxW){
  const handle=document.getElementById(handleId);if(!handle)return;
  let startX,startW;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    startX=e.clientX;startW=colWidths[colKey];
    handle.classList.add('resizing');
    const onMove=e=>{
      colWidths[colKey]=Math.max(minW,Math.min(maxW,startW+(e.clientX-startX)));
      localStorage.setItem('cw_'+colKey,colWidths[colKey]);
      applyColWidths();
    };
    const onUp=()=>{handle.classList.remove('resizing');document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
}

function initResizeHandle(){
  makeResizable('addr-resize-handle','addr',60,500);
  makeResizable('client-resize-handle','client',60,400);
  makeResizable('work-resize-handle','work',80,600);
}

function applyAddrWidth(w){colWidths.addr=Math.max(60,Math.min(500,w));localStorage.setItem('cw_addr',colWidths.addr);applyColWidths();}

document.addEventListener('mouseup',()=>{
  if(dragFill.active){
    document.querySelectorAll('td.drag-preview').forEach(td=>td.classList.remove('drag-preview'));
    dragFill={active:false,rowId:null,startDate:null,removing:false};
  }
});

initSB();
rebuildAll();

/* ── REALTIME SYNC ───────────────────────────────────────── */
function initRealtime(){
  if(!sbClient)return;
  try{
    sbClient.channel('plan-changes')
      .on('postgres_changes',{event:'*',schema:'public',table:'plan_rows'},()=>syncFromSB())
      .on('postgres_changes',{event:'*',schema:'public',table:'plan_cells'},()=>syncFromSB())
      .on('postgres_changes',{event:'*',schema:'public',table:'plan_persons'},()=>syncFromSB())
      .subscribe((status)=>{
        if(status==='SUBSCRIBED'){setSyncStatus('ok')}
        else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){
          setSyncStatus('err');
          setTimeout(initRealtime,5000);
        }
      });
  }catch(e){setSyncStatus('err')}
}
window.addEventListener('load',()=>{
  if(!SB_URL||!SB_KEY){
    const b=document.getElementById('setup-banner');
    if(b)b.style.display='flex';
  }
  setTimeout(()=>{applyColWidths();initResizeHandle();jumpToday();},150);
});
</script>
