<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planningtool — Thuisaccu Winkel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app{padding:12px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;flex-shrink:0}
.toolbar input[type=text]{flex:1;min-width:160px;max-width:260px;font-size:13px;padding:5px 10px;border:1px solid #d0d0cc;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.toolbar input[type=text]:focus{border-color:#4A90D9}
.toolbar button{font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer;white-space:nowrap;border:1px solid #d0d0cc;background:#fff;color:#1a1a1a}
.toolbar button:hover{background:#f0f0ec}
.persons-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center;flex-shrink:0}
.person-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;border:2px solid transparent;user-select:none}
.person-chip.selected{border-color:rgba(0,0,0,0.45)}
.legend-label{font-size:12px;color:#777;margin-right:4px}
.scroll-wrap{overflow:auto;border:1px solid #e0e0db;border-radius:12px;background:#fff;flex:1;min-height:0}
table{border-collapse:collapse;font-size:11.5px;table-layout:fixed}
thead th{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e0e0db}
th,td{border-right:1px solid #e8e8e4;border-bottom:1px solid #e8e8e4;padding:0}

/* sticky left columns */
th.col-drag{width:22px;min-width:22px;position:sticky;left:0;z-index:11;background:#fff}
th.col-addr{width:160px;min-width:160px;text-align:left;padding:6px 8px 6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:22px;z-index:11;background:#fff;overflow:visible}
.col-resize-handle{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:20;display:flex;align-items:center;justify-content:center;user-select:none}
.col-resize-handle::after{content:'';display:block;width:2px;height:60%;background:#d0d0cc;border-radius:2px}
.col-resize-handle:hover::after,.col-resize-handle.resizing::after{background:#4A90D9}
th.col-client{width:120px;min-width:120px;text-align:left;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:182px;z-index:11;background:#fff;overflow:visible}
th.col-work{width:200px;min-width:200px;text-align:left;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:302px;z-index:11;background:#fff;overflow:visible}

td.col-drag{width:22px;min-width:22px;position:sticky;left:0;z-index:8;background:#fff;text-align:center;vertical-align:middle;cursor:grab;color:#ccc;user-select:none;font-size:14px;line-height:1}
td.col-drag:active{cursor:grabbing}
td.col-addr{width:160px;min-width:160px;max-width:160px;padding:6px 8px;font-size:12px;vertical-align:middle;color:#1a1a1a;position:sticky;left:22px;z-index:8;background:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
td.col-client{width:120px;min-width:120px;max-width:120px;padding:5px 8px;font-size:11px;vertical-align:middle;position:sticky;left:182px;z-index:8;background:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
td.col-client:hover{background:#f0f6ff !important}
td.col-work{width:200px;min-width:200px;max-width:200px;padding:5px 8px;font-size:11px;color:#666;vertical-align:middle;position:sticky;left:302px;z-index:8;background:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

tbody tr:hover td.col-drag,tbody tr:hover td.col-addr,tbody tr:hover td.col-work{background:#f8f8f5}
tbody tr:hover td.col-client{background:#f0f6ff}

th.col-mat{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:502px;z-index:11;background:#fff}
th.col-planned{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:582px;z-index:11;background:#fff}
th.col-done{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:662px;z-index:11;background:#fff}
th.col-inv{width:80px;min-width:80px;text-align:center;padding:6px 8px;font-weight:600;color:#888;font-size:11px;position:sticky;left:742px;z-index:11;background:#fff}
td.col-mat{width:80px;min-width:80px;position:sticky;left:502px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
td.col-planned{width:80px;min-width:80px;position:sticky;left:582px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
td.col-done{width:80px;min-width:80px;position:sticky;left:662px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
td.col-inv{width:80px;min-width:80px;position:sticky;left:742px;z-index:8;background:#fff;text-align:center;vertical-align:middle;padding:0}
tbody tr:hover td.col-mat,tbody tr:hover td.col-planned,tbody tr:hover td.col-done,tbody tr:hover td.col-inv{background:#f8f8f5}
tr.highlight td.col-mat,tr.highlight td.col-planned,tr.highlight td.col-done,tr.highlight td.col-inv{background:#fff8e1 !important}
.mat-cb{width:16px;height:16px;cursor:pointer;accent-color:#27AE60}
th.month-hd{text-align:center;font-size:10px;font-weight:600;color:#999;padding:3px 4px;letter-spacing:.3px;text-transform:uppercase;border-top:1px solid #e8e8e4}
th.week-hd{text-align:center;font-size:9px;color:#bbb;padding:2px 0;width:48px;min-width:48px;max-width:48px}
th.day-hd{text-align:center;font-size:9px;width:48px;min-width:48px;max-width:48px;padding:3px 2px;color:#888;line-height:1.3}
th.day-hd.we{background:#f2f2ee}
td.day-cell{width:48px;min-width:48px;max-width:48px;height:42px;cursor:pointer;vertical-align:top;padding:0;overflow:hidden;position:relative}
td.day-cell:hover{outline:2px solid #555;outline-offset:-1px;z-index:5}
td.day-cell.we{background:#f5f5f1}
.cell-inner{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
.cell-seg{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cell-seg span{font-size:8px;font-weight:700;color:#fff;line-height:1;padding:0 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

tr.highlight td.col-addr,tr.highlight td.col-work,tr.highlight td.col-drag,tr.highlight td.col-client{background:#fff8e1 !important}
tr.drag-over td{box-shadow:inset 0 -2px 0 #4A90D9}
tr.dragging{opacity:.35}

/* client name display in cell */
.client-name{font-weight:500;color:#1a56db;font-size:11px}
.client-has-contact::after{content:'ℹ';font-size:9px;color:#9ca3af;margin-left:3px;vertical-align:middle}

/* contact popup */
.contact-popup{position:fixed;z-index:600;background:#fff;border:1px solid #d0d0cc;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.13);padding:16px 18px;min-width:220px;max-width:280px}
.contact-popup h4{font-size:13px;font-weight:600;margin-bottom:10px;color:#1a1a1a;display:flex;align-items:center;justify-content:space-between}
.contact-popup h4 button{background:none;border:none;cursor:pointer;font-size:16px;color:#999;line-height:1;padding:0 2px}
.contact-popup h4 button:hover{color:#333}
.contact-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;color:#333}
.contact-row svg{flex-shrink:0;opacity:.5}
.contact-row a{color:#1a56db;text-decoration:none}
.contact-row a:hover{text-decoration:underline}
.contact-note{font-size:11px;color:#666;margin-top:8px;padding-top:8px;border-top:1px solid #eee;line-height:1.5}

/* modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:22px 24px;width:400px;max-width:95vw;border:1px solid #ccc;box-shadow:0 8px 24px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px;color:#1a1a1a}
.modal label{display:block;font-size:11px;color:#777;margin:8px 0 3px}
.modal input[type=text],.modal textarea{width:100%;font-size:12px;padding:6px 9px;border:1px solid #ccc;border-radius:8px;outline:none;color:#1a1a1a;background:#fff}
.modal input[type=text]:focus,.modal textarea:focus{border-color:#4A90D9}
.modal textarea{resize:vertical;min-height:56px}
.modal-section{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px;padding-top:14px;border-top:1px solid #eee}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.mbtn{font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#1a1a1a}
.mbtn:hover{background:#f5f5f3}
.mbtn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.mbtn.primary:hover{background:#333}
.mbtn.danger{color:#dc2626;border-color:#fca5a5}
.mbtn.danger:hover{background:#fff5f5}
.sb-note{font-size:11px;color:#777;line-height:1.6;margin-top:10px;background:#f8f8f5;padding:10px;border-radius:8px}
.sb-note code{font-family:monospace;font-size:10px;background:#eee;padding:1px 4px;border-radius:3px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ccc;margin-right:4px;vertical-align:middle}
.sync-dot.ok{background:#22c55e}.sync-dot.err{background:#ef4444}
.sync-dot.busy{background:#f59e0b;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pmrow{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.pmrow input[type=color]{width:30px;height:28px;padding:1px;border-radius:5px;border:1px solid #ccc;cursor:pointer;flex-shrink:0}
.pmrow input[type=text]{flex:1;font-size:12px;padding:5px 8px;border:1px solid #ccc;border-radius:8px;outline:none;color:#1a1a1a}
td.day-cell.drag-preview{outline:2px solid #4A90D9 !important;outline-offset:-2px;z-index:7;background:#dbeafe !important}
td.day-cell.drag-preview.we{background:#bfdbfe !important}
.cell-tooltip{position:fixed;background:#222;color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;pointer-events:none;z-index:999;white-space:pre;line-height:1.5;display:none}
</style>
</head>
<body>
<div
